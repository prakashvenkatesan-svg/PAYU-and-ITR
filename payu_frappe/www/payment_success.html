<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful – Aionion Advisory</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #f4f7fb 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
            padding: 56px 48px; text-align: center;
            max-width: 460px; width: 100%;
            animation: fadeIn .5s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .icon-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 40px;
            box-shadow: 0 4px 16px rgba(67,160,71,.35);
        }
        h1 { color: #1b5e20; font-size: 26px; margin-bottom: 12px; }
        p  { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
        .btn {
            display: inline-block; padding: 13px 36px;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            color: #fff; border-radius: 8px; text-decoration: none;
            font-size: 15px; font-weight: 600;
            box-shadow: 0 4px 12px rgba(67,160,71,.3);
            transition: transform .2s, box-shadow .2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(67,160,71,.4); }
        .note { font-size: 13px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-circle">✓</div>
    <h1>Payment Successful!</h1>
    <p>
        Thank you for your payment.<br>
        Your ITR filing request has been confirmed and our team will begin processing shortly.
        You will receive a confirmation email with further details.
    </p>
    <a href="/" class="btn">Back to Home</a>
    <p class="note">For assistance, reach us at support@aionionadvisory.com</p>
</div>
</body>
</html>
